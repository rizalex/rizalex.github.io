# Site
name: 'Gray Area 101'
description: 'Personal blog berisi catatan, tulisan, rangkuman atau apapun itu namanya.'
logo: 'assets/images/logo.png'
favicon: 'assets/images/favicon.ico'

url: "https://rizalex.github.io"
baseurl: ""

disqus: 'demowebsite'
email: 'rizal.ex99@gmail.com'
mailchimp-list: 'https://wowthemes.us11.list-manage.com/subscribe/post?u=8aeb20a530e124561927d3bd8&amp;id=8c3d2d214b'

include: ["_pages"]
permalink: /:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag

authors:
    rizal:
      name:           Rizal
      site:           https://sites.google.com/view/greyarea101
      avatar:         assets/images/IMG_5231.jpg
      bio:            "Hi, I am Rizal, the owner of this site, thanks to coming and please share if you like it!"
      email:          rizal.ex99@gmail.com
      twitter:        https://twitter.com/zalardian

# Defaults
defaults:

  # all posts
  - scope:
      path: "_posts"
    values:
      layout: post
      author: sal
      avatar: /assets/images/avatar1.jpg

  # all pages
  - scope:
      path: "_pages"
    values:
      layout: page

# Syntax
markdown: kramdown
highlighter: rouge

# Paginate
paginate: 10



# Exclude metadata and development time dependencies (like Grunt plugins)
exclude: [README.markdown, package.json, grunt.js, Gruntfile.js, Gruntfile.coffee, node_modules]
